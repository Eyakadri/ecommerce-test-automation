[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for organizing tests
markers =
    smoke: Quick sanity check tests
    regression: Full regression suite
    login: Login functionality tests
    register: Registration functionality tests
    search: Search functionality tests
    product: Product page functionality tests
    cart: Shopping cart functionality tests
    checkout: Checkout functionality tests

# Report settings
addopts = 
    -v
    --tb=short

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests/

# Logging
log_cli = false
log_level = INFO
